name: Daily News Scraper

on:
  schedule:
    - cron: '0 6 * * *' # 6:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # Add our single CSV file
          git add alle_artikel.csv
          
          # Commit the changes (or exit peacefully if there were no new articles today)
          git commit -m "Auto-updated alle_artikel.csv with new news" || exit 0
          git push